services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    image: we-mp-rss-backend:dev
    container_name: we-mp-rss-backend-dev
    restart: unless-stopped
    environment:
      DB: sqlite:///data/we_mp_rss.db
      USERNAME: admin
      PASSWORD: admin@123
      TZ: Asia/Shanghai
      AUTO_RELOAD: "True"
    ports:
      - "8001:8001"
    volumes:
      - ../apis:/app/apis
      - ../core:/app/core
      - ../driver:/app/driver
      - ../jobs:/app/jobs
      - ../migrations:/app/migrations
      - ../public:/app/public
      - ../schemas:/app/schemas
      - ../tools:/app/tools
      - ../views:/app/views
      - ../main.py:/app/main.py
      - ../web.py:/app/web.py
      - ../init_sys.py:/app/init_sys.py
      - ../data_sync.py:/app/data_sync.py
      - ../job.py:/app/job.py
      - ../data:/app/data

  frontend:
    build:
      context: ..
      dockerfile: web_ui/Dockerfile.dev
    image: we-mp-rss-frontend:dev
    container_name: we-mp-rss-frontend-dev
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://backend:8001/
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ../web_ui:/app/web_ui
      - web_ui_node_modules:/app/web_ui/node_modules

volumes:
  web_ui_node_modules:
